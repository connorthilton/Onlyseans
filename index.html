<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>Outreach Dialer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Outreach Dialer</h1>
    <p class="subtitle">Utah County &middot; one client per industry</p>
  </header>

  <nav class="industry-tabs" id="industryTabs"></nav>

  <main id="list" class="list"></main>

  <div class="toast" id="toast" hidden></div>

  <!-- Outcome sheet -->
  <div class="sheet-backdrop" id="sheetBackdrop" hidden>
    <div class="sheet" id="sheet" role="dialog" aria-modal="true">
      <div class="sheet-handle"></div>
      <h2 id="sheetTitle">Log call</h2>
      <p class="sheet-sub" id="sheetSub"></p>

      <div class="sheet-step" id="stepAnswered">
        <p class="sheet-q">Did they answer?</p>
        <div class="btn-row">
          <button class="big-btn" data-answered="yes">Answered</button>
          <button class="big-btn ghost" data-answered="no">No answer</button>
        </div>
      </div>

      <div class="sheet-step" id="stepInterested" hidden>
        <p class="sheet-q">Interested?</p>
        <div class="btn-row">
          <button class="big-btn good" data-interested="yes">Interested</button>
          <button class="big-btn bad" data-interested="no">Not interested</button>
        </div>
      </div>

      <label class="note-label" for="noteInput">Note (optional)</label>
      <textarea id="noteInput" rows="2" placeholder="Anything worth remembering..."></textarea>

      <div class="btn-row">
        <button class="big-btn" id="saveOutcome">Save</button>
        <button class="big-btn ghost" id="cancelOutcome">Cancel</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
